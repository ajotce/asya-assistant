groups:
  - name: asya-backend-alerts
    rules:
      - alert: AsyaHighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_requests_total[5m])), 1e-9)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          service: asya-backend
        annotations:
          summary: "Asya backend high 5xx error rate"
          description: "5xx error rate is above 5% for 5 minutes."

      - alert: AsyaHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket[10m]))
          ) > 2
        for: 10m
        labels:
          severity: warning
          service: asya-backend
        annotations:
          summary: "Asya backend high p95 latency"
          description: "p95 latency is above 2 seconds for 10 minutes."

      - alert: AsyaDatabaseUnavailable
        expr: up{job="asya-backend"} == 0
        for: 2m
        labels:
          severity: critical
          service: asya-backend
        annotations:
          summary: "Asya backend is down"
          description: "Prometheus cannot scrape backend metrics endpoint. Check DB and app availability."

      - alert: AsyaLLMProviderUnavailable
        expr: asya_llm_provider_up == 0
        for: 5m
        labels:
          severity: critical
          service: asya-backend
        annotations:
          summary: "LLM provider unavailable"
          description: "VseLLM health probe fails for 5 minutes."

      - alert: AsyaIntegrationTokensExpiredMassively
        expr: sum(asya_expired_integration_tokens) > 20
        for: 15m
        labels:
          severity: warning
          service: asya-backend
        annotations:
          summary: "Integration tokens expired massively"
          description: "More than 20 integration connections are marked as expired."
