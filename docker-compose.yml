services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${ASYA_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - asya_data:/app/data
      - asya_tmp:/app/tmp
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  asya_data:
  asya_tmp:
