services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${ASYA_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      FRONTEND_DIST_PATH: /app/frontend-dist
    volumes:
      - asya_data:/app/data
      - asya_tmp:/app/tmp
      - ./frontend/dist:/app/frontend-dist:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      document-converter:
        condition: service_healthy

  document-converter:
    build:
      context: ./docker/document-converter
      dockerfile: Dockerfile
    environment:
      TZ: ${TZ:-Europe/Moscow}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=3)"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  asya_data:
  asya_tmp:
