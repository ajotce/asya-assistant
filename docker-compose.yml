services:
  postgres:
    build:
      context: .
      dockerfile: ./backend/docker/postgres/Dockerfile
    image: asya-postgres:16-pgvector
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-asya}
      POSTGRES_USER: ${POSTGRES_USER:-asya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asya}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asya} -d ${POSTGRES_DB:-asya}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${ASYA_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      FRONTEND_DIST_PATH: /app/frontend-dist
    volumes:
      - asya_data:/app/data
      - asya_tmp:/app/tmp
      - ./frontend/dist:/app/frontend-dist:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  minio:
    image: minio/minio:latest
    profiles: ["s3"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    profiles: ["s3"]
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 $${S3_ACCESS_KEY:-minioadmin} $${S3_SECRET_KEY:-minioadmin}; do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/$${S3_BUCKET:-asya-dev};
      exit 0;
      "
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-asya-dev}

volumes:
  asya_data:
  asya_tmp:
  minio_data:
  postgres_data:
