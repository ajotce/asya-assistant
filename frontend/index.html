<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1c4fa3" />
    <meta
      name="description"
      content="Asya — персональный AI-ассистент для задач, документов и ежедневных workflow."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Asya" />
    <meta property="og:title" content="Asya — персональный AI-ассистент" />
    <meta
      property="og:description"
      content="Asya помогает с задачами, документами и ежедневными workflow. Запросите инвайт."
    />
    <meta property="og:url" content="https://asya-assistant.app/" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Asya" />
    <link rel="icon" href="/icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Asya — персональный AI-ассистент</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("asya:theme");
          var pref = stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
          var resolved = pref;
          if (pref === "system") {
            resolved = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.setAttribute("data-theme", resolved);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
