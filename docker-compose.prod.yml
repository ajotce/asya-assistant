services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      FRONTEND_DIST_PATH: /app/frontend-dist
      APP_ENV: production
      ASYA_HOST: 0.0.0.0
    volumes:
      - asya_data:/app/data
      - asya_tmp:/app/tmp
      - ./frontend/dist:/app/frontend-dist:ro
    restart: unless-stopped
    depends_on:
      document-converter:
        condition: service_healthy

  document-converter:
    build:
      context: ./docker/document-converter
      dockerfile: Dockerfile
    environment:
      TZ: ${TZ:-Europe/Moscow}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=3)"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  asya_data:
  asya_tmp:
  caddy_data:
  caddy_config:
